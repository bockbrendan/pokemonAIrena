# Default battle + harness configuration. One battle, best team standing wins.

world:
  backend: vision            # mock (in-memory, default) | project64 | retroarch | vision
  level: 50                # Stadium-style level cap for the mock engine
  # emulator-only connection (ignored for mock)
  retroarch:
    host: 127.0.0.1
    port: 55355            # RetroArch Network Control Interface (UDP)
  vision:                  # backend: vision — play the REAL game via screen OCR + keyboard
    region: null           # capture rect [x, y, w, h] in screen points; null = whole display
    turn_wait: 4.0         # seconds to let a turn animate after a move is confirmed
    menu_wait: 0.6         # seconds to let the move menu animate in after pressing A
    poll: 0.3              # seconds between screen polls while waiting for the next turn
    capture: window        # window (capture RetroArch by identity — move/resize freely) | auto | screencapture | imagegrab
    window: RetroArch      # window-title substring to capture (used when capture: window; macOS)
    ocr: auto              # auto (Vision on macOS, Tesseract elsewhere) | vision | tesseract
    keyboard: auto         # auto (by platform) | mac (Quartz) | windows (SendInput)
    read_inventory: true   # at battle start, open the POKéMON screen to read the full team
                           # roster (bench context for type matchups + voluntary switches)
    pokemon_button: pokemon  # keymap name for the "POKéMON" action-bar option (party screen)
  project64:
    host: 127.0.0.1
    port: 8082             # local bridge exposed by the Project64 script

battle:
  # Species + moves must exist in kb/. For the vision backend your MOVES are read
  # live off the move menu (config moves are just a seed) — species still matter for
  # matching the active mon. For the mock backend these teams ARE the battle.
  # (Movepools here are for a playable demo, not competitive legality.)
  player_team:
    - {species: Starmie,   moves: [Surf, Blizzard, Thunderbolt, Psychic]}
    - {species: Tauros,    moves: [Body Slam, Earthquake, Blizzard, Hyper Beam]}
    - {species: Exeggutor, moves: [Psychic, Mega Drain, Double-Edge]}
  opponent_team:
    - {species: Snorlax,   moves: [Body Slam, Earthquake, Ice Beam, Hyper Beam]}
    - {species: Rhydon,    moves: [Earthquake, Rock Slide, Body Slam]}
    - {species: Alakazam,  moves: [Psychic, Thunderbolt]}

guardrails:
  block_zero_effect: true  # replace a 0x-effectiveness move with the best legal move
  warn_bad_switch: true    # flag switching a mon into a super-effective hit

agent:
  player: llm        # heuristic (deterministic, no API) | llm
  # --- used only when player: llm ---
  provider: claudecli      # claude (Anthropic API) | llamacpp (local server) | claudecli (Claude Code CLI, no key/server)
  model: local             # claude: model id (Haiku = low cost) | llamacpp: served name (llama-server ignores)
  claudecli:               # provider: claudecli -> decisions via `claude -p` (your subscription)
    command: claude        # the Claude Code CLI on PATH
    timeout: 60            # seconds per decision (CLI spin-up is slower than the API)
  max_tokens: 64           # a move pick is one short line
  llamacpp:                # local llama.cpp server (llama-server), OpenAI-compatible
    host: 127.0.0.1
    port: 8080
  token_budget: 50000

run:
  max_turns: 300           # hard cap so a battle can never hang
